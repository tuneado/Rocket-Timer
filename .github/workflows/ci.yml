name: CI — Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  # ─── STAGE 1: Lint & Unit Tests (fast, no Electron needed) ───
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── STAGE 2: Build verification on all platforms ───
  build:
    name: Build (${{ matrix.label }})
    needs: [lint, unit-tests]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows x64
            args: --win --x64
          - os: ubuntu-latest
            label: Linux
            args: --linux

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libopenjp2-tools rpm fakeroot dpkg

      - run: npm ci

      - name: Build CSS & JS
        run: npm run build

      - name: Package with electron-builder (no publish)
        run: npx electron-builder ${{ matrix.args }} --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.label }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.snap
          retention-days: 14

  # ─── STAGE 3: E2E smoke tests (Electron launch + API check) ───
  e2e-tests:
    name: E2E Smoke (${{ matrix.label }})
    needs: [lint, unit-tests]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libasound2t64

      - run: npm ci

      - name: Build CSS & JS
        run: npm run build

      - name: Run E2E smoke tests (Linux — xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Run E2E smoke tests (Windows)
        if: runner.os == 'Windows'
        run: npm run test:e2e

  # ─── Summary ───
  ci-summary:
    name: CI Summary
    if: always()
    needs: [lint, unit-tests, build, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build:      ${{ needs.build.result }}"
          echo "E2E Tests:  ${{ needs.e2e-tests.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "::error::One or more CI stages failed"
            exit 1
          fi
