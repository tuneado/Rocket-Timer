<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Display Window</title>
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../css/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/bootstrap-icons-custom.css">
</head>
<body>
  <!-- Display Section Layout (same as main window right column) -->
  <div class="display-section display-window-layout">
    
    <!-- Progress Bar -->
    <div class="progress-area">
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
    </div>

    <!-- Timer Display -->
    <div class="timer-area">
      <h1 id="countdown">00:25:00</h1>
      <div id="clock" class="clock" style="display: none;">--:--:--</div>
    </div>

    <!-- Message Area -->
    <div id="messageArea" class="message-area" style="display: none;">
      <div id="messageText" class="message-text"></div>
    </div>

  </div>
  <script src="../js/display.js"></script>
</body>
</html>
