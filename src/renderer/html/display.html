<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Display Window</title>
  <link rel="stylesheet" href="../css/shared.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    /* Canvas element that renders the timer display */
    #displayCanvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000000;
    }
  </style>
</head>
<body>
  <!-- Canvas element that renders the same content as main window -->
  <canvas id="displayCanvas"></canvas>
  
  <script src="../layouts/layoutRegistry.js"></script>
  <script src="../js/canvasRenderer.js"></script>
  <script src="../js/displayCanvas.js"></script>
</body>
</html>
