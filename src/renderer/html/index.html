<!DOCTYPE html>
<html class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' data:;">
  <title>Countdown Timer</title>
  <link rel="stylesheet" href="../css/design-tokens.css">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/bootstrap-icons-custom.css">
  <link rel="stylesheet" href="../css/shared.css">
  <link rel="stylesheet" href="../dist/tailwind.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      var d = document.documentElement;
      if (t === 'dark') { d.classList.add('dark'); d.setAttribute('data-theme', 'dark'); }
      else { d.classList.remove('dark'); d.setAttribute('data-theme', 'light'); }
    })();
  </script>
</head>
<body class="bg-bg-base text-text-primary font-ui">
  <div id="app"></div>
  
  <script type="module" src="../layouts/layoutRegistry.js"></script>
  <script type="module" src="../js/videoInputManager.js"></script>
  <script type="module" src="../js/UnifiedCanvasRenderer.js"></script>
  <script type="module" src="../js/statusBar.js"></script>
  <!-- Load Preact components before countdown so DOM elements exist -->
  <script type="module" src="../dist/renderer.bundle.js"></script>
  <script type="module" src="../js/countdown.js"></script>
</body>
</html>
