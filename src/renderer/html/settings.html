<!DOCTYPE html>
<html class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Preferences</title>
  <link rel="stylesheet" href="../css/design-tokens.css">
  <link rel="stylesheet" href="../css/fonts.css">
  <link rel="stylesheet" href="../css/bootstrap-icons.css">
  <link rel="stylesheet" href="../dist/tailwind.css">
  <link rel="stylesheet" href="../css/settings.css">
  <script>
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      var d = document.documentElement;
      if (t === 'dark') { d.classList.add('dark'); d.setAttribute('data-theme', 'dark'); }
      else { d.classList.remove('dark'); d.setAttribute('data-theme', 'light'); }
    })();
  </script>
</head>
<body class="bg-[var(--bg-base)] text-[var(--text-primary)]">
  <!-- Preact will render into this container -->
  <div id="settings-root"></div>

  <!-- Load layout registry for dynamic options -->
  <script src="../layouts/layoutRegistry.js"></script>
  
  <!-- Preact bundle renders the UI -->
  <script type="module" src="../dist/settings.js"></script>
  
  <!-- Settings business logic (attaches to DOM elements rendered by Preact) -->
  <script type="module">
    import { applyCanvasColors } from '../js/modules/settingsManager.js';
    window.applyCanvasColors = applyCanvasColors;
  </script>
  <script src="../js/settings.js"></script>
</body>
</html>
